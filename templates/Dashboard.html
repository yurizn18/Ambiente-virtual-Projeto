<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Painel</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="/static/css/style_dashboard.css">
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="avatar avatar-logo">
          <img src="/assets/img/NAV3.png" alt="ANDA LOGO" class="brand-logo">
        </div>
        <div>
          <b>ANDA LOGO</b>
          <small>Painel do Estabelecimento</small>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="Dashboard.html"><i class="bi bi-grid"></i>Dashboard</a>
        <a href="Criar_FIla.html"><i class="bi bi-plus-lg"></i>Criar Fila</a>
        <a href="Atendimento.html"><i class="bi bi-person"></i>Atendimento</a>
        <a href="Fila_ao_vivo.html"><i class="bi bi-list-task"></i>Fila ao Vivo</a>
        <a href="Qr_code.html"><i class="bi bi-qr-code"></i>QR Code</a>
        <a href="Configuraçoes.html"><i class="bi bi-gear"></i>Configurações</a>
      </nav>

      <footer>© 2026 ANDA LOGO</footer>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

      <header class="topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Abrir menu"><i class="bi bi-list"></i></button>

        <!-- ✅ dinâmico -->
        <div class="estab" id="estabHeader" title="Estabelecimento">
          <span class="dot"></span>
          <span>Estabelecimento:</span>
          <b>&nbsp;<span id="nomeEstabelecimento">—</span></b>
        </div>

        <!-- ✅ padrão Atendimento -->
        <div class="top-actions">
          <button class="icon-btn" type="button" title="Notificações" aria-label="Notificações">
            <i class="bi bi-bell"></i>
          </button>

          <button class="icon-btn" type="button" data-theme-toggle title="Tema" aria-label="Alternar tema">
            <i class="bi bi-sun"></i>
          </button>
        </div>
      </header>

      <section class="page">
        <h1>Dashboard</h1>
        <p class="subtitle">Visão geral do seu estabelecimento</p>

        <!-- MÉTRICAS -->
        <div class="cards">
          <div class="card">
            <i class="bi bi-people"></i>
            <h2 id="fila">0</h2>
            <span>Na fila</span>
          </div>

          <div class="card">
            <i class="bi bi-clock"></i>
            <h2 id="tempoMedioDash">-- min</h2>
            <span>Tempo médio</span>
          </div>

          <div class="card">
            <i class="bi bi-person-check"></i>
            <h2 id="emAtendimentoDash">0</h2>
            <span>Em atendimento</span>
          </div>

          <div class="card">
            <i class="bi bi-geo-alt"></i>
            <h2 id="noRaioDash">0</h2>
            <span>No raio</span>
          </div>
        </div>
        <!-- FIM MÉTRICAS -->

        <!-- PRÓXIMO -->
        <div class="box">
          <h3>Próximo da fila</h3>

          <div class="next">
            <div>
              <b id="proximoNome">—</b>
              <span class="pill">Aguardando</span>
            </div>

            <button id="btnChamar" class="btn-primary">
              <i class="bi bi-play-fill"></i> Chamar
            </button>
          </div>
        </div>

        <!-- AÇÕES -->
        <div class="actions">
          <button onclick="go('Atendimento.html')" class="btn-primary">Ir para Atendimento</button>
          <button onclick="go('Fila_ao_vivo.html')">Ver Fila ao Vivo</button>
          <button onclick="go('Qr_code.html')">Ver QR Code</button>
          <button onclick="go('Criar_FIla.html')">Criar Nova Fila</button>
        </div>
      </section>
    </main>
  </div>

  <!-- ✅ tema (correto) -->
  <script src="/static/js/app_theme.js"></script>

  <!-- JS da página -->
  <script src="/static/js/app_dashboard.js?v=4"></script>
</body>
</html>
